body:
  text: 雙經沙門明得排定金光明玄義科文分二初釋題二初經義題目金光二能說師號天台二釋文二初釋序文二初總示法體此金二別明教意二初敘說經意二初據理絕言二初約我辨三初明果人不能盡喻太虗二明因位未能窮源二初約喻以智斷斥日輪二約法以因果定諸佛三明凡小全迷所以二初小況二二凡凡夫二引文證二初大品故大二大經經言二赴緣可說四初明有緣須說有因二明此說可尊二初列經五義以金二結示可尊故唯三明尊故諸聖護持二初極果護持所以二大權宗奉一切四明說故其益該博諸有二敘宣通意四初聖者讚護是以二凡師軌則上聖三托義興言故托四稱法求益冀涓二釋玄義二初列章科判將釋二依科解釋二初總釋二初生起生起二揀別二初料簡三初問起簡別二答通答非三結示五章二分別二初正分別二初約六種別者二例餘義如此二約喻顯二初立喻今顯二合六種囊中二別釋五初釋名二初釋別名二初定三五詳略無妨二別二約文義先後而釋二初據文先釋三字二初約教義釋二初標列令釋二正釋五初通別二初揀示通別四初泛明三通別言通二揀二用教且置三明教功能夫理四正明教通別若從二經題通別二初徧示諸部二初正用通別釋題二初通云何二別二初明別相云何二結四悉悅宜二喻顯通別成教譬如二的判此經二初釋從別二結今經二翻譯二翻三譬喻釋二初古師釋三初數師二初敘三譬二破若大二地人二初敘地人二破若大三真諦二初敘三初標列真諦二釋三初釋三身譬三二釋三德次譬三釋三位次三三料揀彼家二破二初總破大師二別破三初舉三失一因二釋三失三初因果不通云何二乖圓別乖圓三不稱法性四初引淨名破道前不稱二引華嚴破道中又華三指別義破道後道後四約圓總斥當知三約喻斥豈非二今師釋六初舉今異古天台二據經斥局何有三稱法釋題當知四捨廣從要一切五列章復為六正釋三初標十數二初正標名數言標二略示功能二初約逆順生起顯十法該括始終二初徵諸三二釋三初略顯示此之二正生起二初約施教逆推理顯由事初從二約立行順脩即妄歸真若從三總結示是為二約無量甚深明十法皆悉高廣三初徵起甚深二解釋二初約徧攝明無量三初明各具十法無量二明各具一切又皆三引經證結經云二約竪窮明甚深三初約十法共論甚深二約一法具九又一三約各具六即又一三結歸當知二釋十相四初標次釋二結前生後十名三勸須信解若分四正釋十相二初正解釋十初三德四初標名略示初明二約圓廣釋二初釋三法者二釋德三初明法身四德云何二明般若四德般若三明解脫四德解脫三引證體圓大經四結前生後若得二三寶二初約圓釋義云何二例餘對喻當知三三涅槃二初約圓釋義云何二例餘對喻當知四三身二初約圓釋義云何二例餘對喻當知五三大乘二初約圓釋義云何二例餘對喻當知六三菩提二初約圓釋義云何二例餘對喻當知七三般若二初約圓釋義云何二例餘對喻當知八三佛性二初約圓釋義云何二例餘對喻當知九三識二初約圓釋義云何二例餘對喻當知十三道三初束十二支為三道二初正束云何二釋名道名二約圓釋即事而理苦道三約體達例德對喻當知二示融通三初勸解法圓融若見二引諸經圓證華嚴三設問答顯益問若三簡十法十初簡三德三初標三料二正料簡二初斥偏三初三藏若指二通教若指三別教若如二顯圓今所三勸生圓解若諸二簡三寶料簡三簡三涅槃料簡四簡三身二初簡偏二初明藏通但二無三二初三藏料簡二通教二初正明但二若取二徵釋真身問若二明別教雖三且異若依二顯圓三初明三身皆實三初正明體實若言二引經類顯大至三取意結成今取二明四句俱融若復三明增減自在二初約義立身二初問問三二答二初明義立無咎答佛二明經意本通下經二以身用譬二初問問若二答答若五簡三大乘料簡六簡三菩提料簡七簡三般若料簡八簡三佛性料簡九簡三識料簡十簡三道料簡四附文釋五當體釋二約觀行釋二約義重明二字二釋通名二辨體三明宗四論用五判教相三譬喻釋竟四附文釋二初標第四二釋三初對前顯勝二初總對上義辨上來二別約四事辨何者二正明附文二初委明所附文相二初通論諸品名事始從二的示一部文相三初正示諸文序品二明通三世若信三結遍一經一部二結示無量甚深二初正結示一處二勸審思而不三例同諸經二初例指事立名又二二例以經名事又諸五當體釋二初標第五二釋二初反常情立今正義二初敘古寄俗名真有師二明今則真名俗二初對他略立俗本二稱理委示二初約義委示何者二引教誠證五初引華嚴則真立俗華嚴二引大經真具名實大經三引大論隨理立名龍樹四引淨名事由理造淨名五舉誠教勸物生信經論二用今義立當體名三初明經從當體立名今言二明人從所證立稱菩薩三問答科簡人法二初覈人二初以能仁立妨若爾二約通別為酬二初明別稱允同諸佛釋迦二辨通名皆具三法三初引一文明同具金之三義故贊二引二文明同證性之三法三身三引文定此經題非從譬立故樹二研法二初設執譬問問舊二約雙存答二初答雙存答非二被二根若鈍初約教義釋竟二約觀行釋二初標次觀二釋三初設二問答示觀心所以二初明解須行成故於心作觀二初問起何故二釋出二初正釋上來二引證淨名二明心為行要故觀必研心二初約簡數觀王問問心二約心淨法融答二初約離性先觀內心三初約貴論金答夫二約照論光夫螢三約益論明若心二約合脩自融諸法二初徧融諸法迭顯光明又知二約顯一性結成三法得此二附十法明觀心成行二初舉上教義為所附之法上約二明今觀門為能顯之行十初三道二初示觀二初釋二初通約三道明圓正觀二初兼通數祇於報障義立三道之境今觀二約圓乘即障顯德以明妙觀之功心王二別約三道以空助道三初約假實觀苦道二初約六分觀假人三初舉經文總標觀法如淨二於觀境窮逐假人若頭三明治道助開圓理如此二就五陰觀實法二初結上人空觀身二例觀實法觀色二約愛見觀煩惱道二初簡示身因之境次觀二正明體法之觀三初舉經文約句簡判二初直舉經文淨名二簡非經意二初明雖有四句四初標列句法應作二指示因果云何三去取業惑今且四約人對句四果二明不隨一相如此二於惑境順經脩觀二初推本不生隨一二結隨一相心尚三明治道助開圓理二初正明體法功成隨一二更明餘觀助道既得三約動作觀業道三初舉經文總標觀法次觀二於六作體本無為二初約行緣明觀觀舉二例餘作亦爾觀行三明治道助開圓理是為二結是為二結位夫有二觀三識三初標觀顯理次觀二附法作觀三初略示境觀諦觀二廣陣觀相二初明一心三觀三初空何者二假於此三中識者二明雙亡雙照二初約義立識於二引經證故淨三結成附法以照三結法判位是名三觀三佛性二初標觀顯理次觀二附法作觀二初約三觀所顯明佛性三初直約義立觀一二引經證成三初引淨名病本明心即二諦更引二引華嚴無差明心即佛性華嚴三引般舟念佛明佛即三諦二初引法喻二文又般二釋皆成三諦四初釋法文皆是二釋喻文又以三明亡照又釋四顯一心常見三結法判位觀心二約六法境智明佛性二初正釋二初約境智明佛性復次二約六法明三因二初對顯三因今觀二引證六法故經二示意觀三四觀三般若三初標次觀二釋三初約圓標舉諦觀二寄次別釋三初假一念二空一切三中雙亡三依圓對智二初對智如是二明圓是三三結是為五觀三菩提三初標次觀二釋三初約圓總舉諦觀二寄次別釋三初破假入空何者二破空出假即假三破邊入中空是三依圓對法二初明圓說時二對法一心三結是為六觀三大乘三初標次觀二釋三初總立觀法諦觀二約境明觀三初明四運為境何者二明三運為觀觀一三明對失顯得若隨三以觀對乘二初約法對即空二約人歎三乘三結是為七觀三身三初標次觀二釋三初立觀顯法三初明十相諦觀二辨難易登難三結唯心故知二約心明觀三初空若觀二假若即三中二初著二斥偏如此二亡三顯中善觀三以觀對身言即三結是為八觀三涅槃三初標次觀二釋三初約報心觀性淨諦觀二約起心觀圓淨若妄三約諸數觀方便淨又以三結是為九觀三寶三初標次觀二釋三初立觀顯法諦觀二附法明觀二初約諦智及和就名共論三寶三初依經立名何者二約義釋相三諦三結歸寶義三種二約脩性及和剋體各立三寶三初約性德三俱不覺復次二約脩德三俱是覺知即三約相應三俱和合即中三結法歸題即中三結是為十觀三德三初標次觀二釋三初直列三觀諦觀二約觀明德二初正觀德二初約圓示觀二初示觀即空二明圓雖言二寄佛明德二初明德從觀立諸佛二明德受藏名一一二歎心境二初據經歎要故淨二例三無差當知三結法歸題得此三結此為三對斥邪空顯觀心功德三對斥邪空顯觀心功德三初敘彼邪空世間二以事對破若逢三明今觀德我以二約義重明二字二初標今更二釋二初約真諦解真諦二明今師釋二初明應具三義三初標名略示今明二釋出三義帝則三引經證成此經二依三義解釋二初約教義釋二初明十種三法皆具三義將此二明十種經王皆能攝法二初標列既得二釋相二初正明攝三三初攝法門初攝二攝眾教二初攝諸部第二二攝一切此舉三攝六位二初明十法本位第三二明十法攝位三道二明攝三意所以二約觀行釋二初正釋二初正約帝慧王明觀次觀二會同金光明示位觀心二結意若不別名已竟二釋通名次釋二辨體二初標列第二二解釋三初釋名二初約字略示釋名二就義廣釋二初約二名總釋三初標何為二釋三初一體二名若依二簡通從別三初約義簡法性二引文示文云三據文結故知三為四章主二初法但是二喻類眾三結故以二就三義別釋三初應金名以禮義釋二初直明字訓故書二會同體義當知二應光名以底義釋三初約字訓立復次二引文證成釋論三以今義結此與三應明名以達義釋三初約字訓立復次二引文證成釋論三以今義結此與二引證二初具引四文二引二結成一體當達三料簡二初問三料二答二初正答二初明理非四句答法二赴機須四說雖非二結示門乃三明宗二初標第三二釋二初約義略明三初示字義宗謂二定因果二初泛舉他釋說者二尋究二經今尋三正明宗二初的約果德今此二釋出所以何者二附經委釋二初明今師正釋二初正釋二初據經文立義釋二初約佛壽對法性明宗三初明得果真體更附二稱體立能二初立義法性二示文四佛三約釋疑明宗二初約疑明失此見二約宗顯得若不二約報化對法性明宗三初明果有總別二初明餘經別舉智斷又說二明此經總於二三今經二明宗體融妙二初約三身稱性故互攝果上二約二身即法故難思若能三託疑者彰失此不二約化事比況釋二初立況又如二結釋法性二顯得若見二簡古師非義二初敘舊用二斥皆以四論用三初標示通名第四二正釋此典二初示四名滅惡二明經意二初明果智成由功德夫一二示文旨力用銓次三初明懺讚兩品二初明二行成果三初明二品先後若是二明能成宗體將此三明五義俱備體題二明二品互具但懺二明空品一文空品三明已下諸文四王三牒文結攝攝此五判教相二初標第五二釋二初破他異解三初破舊師判屬不定二初敘舊明二破二初破非五時次第三初舉彼義定是義二引鴦掘並鴦掘三覈成次第若到二破非偏方不定三初舉彼義定若言二引方等破陀羅三引眾經破又華二破一師判屬法華二初敘又一二破是義三破真諦判在三月二初敘真諦二破二初奪破三初總奪是義二引經法華三結破諸經二縱破二初蹤而覈之縱令二驗其無據若屬二明今正判二初以文義定二初簡異餘時今既二定屬方等二初以文定二初引方等文案下二引三乘文方等二約義定二初明方等部元不局而難二明列眾文或未來難者二以教味判如此
